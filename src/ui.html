<!DOCTYPE html>
<style>
  :root {
    --bg-1: #ffffff;
    --bg-2: #f6f6f8;
    --glass: rgba(255, 255, 255, 0.9);
    --glass-strong: rgba(255, 255, 255, 0.95);
    --stroke: rgba(179, 23, 53, 0.18);
    --text: #1b1b1f;
    --text-dim: rgba(27, 27, 31, 0.6);
    --accent: #B31735;
    --accent-2: #cf3e5b;
    --shadow: 0 10px 28px rgba(20, 20, 26, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    padding: 10px;
    color: var(--text);
    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    min-height: 100vh;
  }

  .bg-orb {
    position: fixed;
    width: 260px;
    height: 260px;
    filter: blur(40px);
    opacity: 0.6;
    border-radius: 999px;
    pointer-events: none;
  }
  .orb-1 { background: rgba(179, 23, 53, 0.2); top: -80px; left: -60px; }
  .orb-2 { background: rgba(179, 23, 53, 0.12); bottom: -90px; right: -70px; }

  .app {
    position: relative;
    width: 430px;
    max-width: 100%;
    margin: 0 auto;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    backdrop-filter: none;
  }

  h3 {
    margin: 0 0 12px 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--text);
  }
  
  /* Секции и блоки */
  .section {
    margin-bottom: 18px;
    padding: 12px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(20,20,26,0.08);
  }
  .file-block { 
      margin-bottom: 10px; 
      border: 1px solid rgba(0,0,0,0.06); 
    padding: 6px 10px;
      border-radius: 10px; 
      background: #fafafa; 
      transition: all 0.2s;

  .label {
    font-size: 10px;
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;

    color: #fff;
    border: 1px solid rgba(179, 23, 53, 0.6);
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    font-weight: 600;

  button.secondary { background: #f2f2f4; color: var(--text); border: 1px solid rgba(0,0,0,0.08); }
  button:hover { transform: translateY(-1px); border-color: rgba(179, 23, 53, 0.5); }
  button:disabled { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.45); cursor: not-allowed; }
  
  hr { border: 0; border-top: 1px solid rgba(0,0,0,0.08); margin: 16px 0; }

  /* --- ПРОГРЕСС ОВЕРЛЕЙ --- */
  #progress-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      box-sizing: border-box;
  }
  #progress-overlay.show { display: flex; }
  .overlay-card {

      max-width: 280px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;

  .progress-bg {
      background: rgba(0,0,0,0.08);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;

  .progress-fill {

      border-radius: 4px;

// --- УПРАВЛЕНИЕ UI ---
function showProgress(show) {
    const overlay = document.getElementById('progress-overlay');
    if (show) overlay.classList.add('show');
    else overlay.classList.remove('show');
}

function updateProgress(curr, total, text = "", detail = "") {
    const percent = Math.round((curr / total) * 100);
    document.getElementById('p-bar').style.width = percent + "%";
    document.getElementById('p-percent').innerText = percent + "%";
    document.getElementById('p-status').innerText = text;
    document.getElementById('p-detail').innerText = detail;
}

function disableButtons(disabled) {
    setDisabled('runBtn', disabled);
    setDisabled('updateBtn', disabled);
    setDisabled('testBtn', disabled);
    setDisabled('testLeafletsBtn', disabled);
    setDisabled('validateDataBtn', disabled);
    setDisabled('checkComponentsBtn', disabled);
    const stopBtn = document.getElementById('stopBtn');
    if (stopBtn) stopBtn.disabled = !disabled;
}

function setDisabled(id, disabled) {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
}

function onClick(id, handler) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', handler);
}

function buildFinalGenerationSummary(report, stats) {
    if (!report && !stats) return "";
    const pages = Number(report?.pages) || 0;
    const cards = Number(stats?.cards) || 0;
    const rows = Number(stats?.rows) || 0;
    const loadedImages = Number(stats?.loadedImages) || 0;
    const totalImages = Number(stats?.totalImages) || 0;
    const adPlaceholders = Array.isArray(report?.runs)
        ? report.runs.reduce((sum, run) => sum + (Number(run?.adPlaceholders) || 0), 0)
        : 0;
    const cardErrors = Array.isArray(report?.runs)
        ? report.runs.reduce((sum, run) => sum + (Number(run?.cardErrors) || 0), 0)
        : 0;
    const parts = [`Готово: ${pages} стр.`, `${cards} карточек`, `${rows} строк`];
    if (!stats?.skipImages && totalImages > 0) {
        parts.push(`фото ${loadedImages}/${totalImages}`);
    }
    if (!stats?.isBox && Number(report?.leaflets) > 0) {
        parts.push(`листовок ${report.leaflets}`);
    }
    if (adPlaceholders > 0) {
        parts.push(`рекламных мест ${adPlaceholders}`);
    }
    if (Number(report?.figmaMs) > 0) {
        parts.push(`Figma ${(Number(report.figmaMs) / 1000).toFixed(1)}с`);
    }
    if (Number(report?.totalMs) > 0) {
        parts.push(`всего ${(Number(report.totalMs) / 1000).toFixed(1)}с`);
    }
    if (Number(stats?.smallImageObjectCount) > 0) {
        parts.push(`мелких фото ${stats.smallImageObjectCount}`);
    }
    if (Number(report?.overflowCount) > 0) {
        parts.push(`переполнений ${report.overflowCount}`);
    }
    if (cardErrors > 0) {
        parts.push(`ошибок карточек ${cardErrors}`);
    }
    return parts.join(", ");
}

function resetCancellation() {
    generationCancelled = false;
    activeAbortController = new AbortController();
}

function requestCancellation() {
    generationCancelled = true;
    if (activeAbortController) activeAbortController.abort();
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
}

function throwIfCancelled() {
    if (generationCancelled) {
        throw new Error("Остановлено пользователем");
    }
}

function logMessage(text) {
    const panel = document.getElementById('logPanel');
    if (!panel) return;
    const line = document.createElement('div');
    line.textContent = text;
    panel.appendChild(line);
    panel.classList.add('show');
    panel.scrollTop = panel.scrollHeight;
}

function clearLog() {
    const panel = document.getElementById('logPanel');
    if (!panel) return;
    panel.innerHTML = "";
    panel.classList.remove('show');
}

function showError(message) {
    logMessage("Ошибка: " + message);
    updateProgress(0, 1, "Ошибка", message);
}

function setupDropzone(inputId, dropId, labelId, onFilesChanged = null) {
    const input = document.getElementById(inputId);
    const drop = document.getElementById(dropId);
    const label = document.getElementById(labelId);
    if (!input || !drop || !label) return;

    function setLabel() {
        const file = input.files && input.files[0];
        label.textContent = file ? file.name : "Файл не выбран";
    }

    input.addEventListener('change', () => {
        setLabel();
        if (onFilesChanged) onFilesChanged();
    });

    drop.addEventListener('dragover', (e) => {
        e.preventDefault();
        drop.classList.add('dragover');
    });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', (e) => {
        e.preventDefault();
        drop.classList.remove('dragover');
        const files = e.dataTransfer && e.dataTransfer.files;
        if (!files || files.length === 0) return;
        input.files = files;
        setLabel();
        if (onFilesChanged) onFilesChanged();
    });

    setLabel();
}

window.onmessage = (e) => {
    const msg = e.data.pluginMessage;

    if (msg.type === 'progress') {
        showProgress(true);
        updateProgress(msg.curr, msg.total, "Верстка макета...", `Карточка ${msg.curr} из ${msg.total}`);
    }

    if (msg.type === 'log') {
        logMessage(msg.text);
    }

    if (msg.type === 'complete') {
        const finalText = buildFinalGenerationSummary(msg.report, lastGenerationStats) || msg.text || "Готово";
        updateProgress(100, 100, "Готово!", finalText);
        if (msg.report) {
            logMessage(finalText);
            const adSizes = (msg.report.runs || []).flatMap(run => run.adSizes || []);
            if (adSizes.length > 0) {
                logMessage(`Рекламные места: ${adSizes.join("; ")}`);
            }
        } else if (msg.text) {
            logMessage(msg.text);
        }
        setTimeout(() => {
            disableButtons(false);
            showProgress(false);
        }, 500);
    }

    if (msg.type === 'error') {
        showError(msg.text);
        disableButtons(false);
        showProgress(false);
    }

    if (msg.type === 'components-check-result') {
        const missing = (msg.results || []).filter(item => !item.ok).map(item => item.name);
        for (const item of msg.results || []) {
            logMessage(`${item.ok ? "OK" : "Нет"}: ${item.name}`);
        }
        if (missing.length > 0) {
            showError("Не найдены компоненты: " + missing.join(", "));
        } else {
            logMessage("Шаблон проверен: все ключевые компоненты доступны");
        }
        disableButtons(false);
        showProgress(false);
    }

    if (msg.type === 'google-sheets-result') {
        const sheets = msg.sheets || [];
        googleSheetsList = sheets;
        refreshGoogleSheetSelects();
        if (sheets.length === 0) {
            showError("Google не вернул листы");
        } else {
            updateProgress(100, 100, "Готово", "Листы загружены");
        }
        setTimeout(() => {
            disableButtons(false);
            showProgress(false);
        }, 400);
    }

    if (msg.type === 'google-csv-result') {
        const requestId = msg.requestId || "primary";
        const csvText = msg.csv || "";
        const sheetName = msg.sheetName || "";
        const gid = msg.gid || "";
        const parsedOrder = parseOrderFileBest([csvText]);
        googleLoadedSheets.set(requestId, {
            id: requestId,
            gid,
            sheetName,
            promoType: detectPromoTypeFromSheetName(sheetName || gid || ""),
            csv: csvText,
            parsedOrder
        });
        syncPrimaryGoogleState();
        currentOrderInfoMap = parsedOrder.infoMap;
        updateCombinedOrderSummary();
        const columns = detectCsvColumns(csvText);
        if (columns) {
            const boxCols = [columns.boxPrice, columns.multiplicity, columns.boxQty, columns.boxNotice].filter(Boolean).join(", ");
            logMessage(`CSV колонки: код=${columns.code || "-"}, листовка=${columns.leaflet || columns.group || "-"}, цена=${columns.price || "-"}`);
            if (boxCols) logMessage(`Коробочные колонки: ${boxCols}`);
        }
        const label = document.getElementById('orderFileName');
        if (label) label.textContent = getLoadedSheetsLabel();
        logCatalogSheetCheck(getEmbeddedProducts(), parsedOrder);
        updateProgress(100, 100, "Готово", "Лист загружен");
        setTimeout(() => {
            disableButtons(false);
            showProgress(false);
        }, 400);
    }

    if (msg.type === 'split-query') {
        const name = msg.cardName || "карточка";
        const h = msg.cardHeight || 0;
        const col = msg.colHeight || 0;
        const ok = confirm(`Карточка "${name}" выше колонки (${Math.round(h)} > ${Math.round(col)}). Разбить?`);
        parent.postMessage({ pluginMessage: { type: 'split-response', id: msg.id, split: ok } }, '*');
    }
};

function pickLeafletTestGroups(jsonData, infoMap, maxPerLeaflet = 2) {
    const selected = [];
    const counts = new Map();
    for (const item of Array.isArray(jsonData) ? jsonData : []) {
        const mainSku = item && item.variants && item.variants.length > 0 ? item.variants[0].sku : null;
        const leafletName = resolveLeafletName(mainSku, item, infoMap).trim();
        if (!leafletName) continue;
        const key = normalizeLeafletKey(leafletName);
        const current = counts.get(key) || 0;
        if (current >= maxPerLeaflet) continue;
        selected.push(item);
        counts.set(key, current + 1);
    }
    return selected.length > 0 ? selected : (Array.isArray(jsonData) ? jsonData.slice(0, 10) : []);
}

function normalizeLeafletKey(value) {
    return String(value || "").replace(/\s+/g, " ").trim().toLowerCase();
}

function addLeafletCount(map, rawName, count = 1) {
    const key = normalizeLeafletKey(rawName);
    if (!key) return;
    const current = map.get(key) || { title: String(rawName || "").replace(/\s+/g, " ").trim(), count: 0 };
    current.count += count;
    map.set(key, current);
}

function buildLeafletCounts(sourceGroups, infoMap) {
    const leafletCounts = new Map();
    let withoutLeaflet = 0;
    for (const item of Array.isArray(sourceGroups) ? sourceGroups : []) {
        const mainSku = item && item.variants && item.variants.length > 0 ? item.variants[0].sku : null;
        const leafletName = resolveLeafletName(mainSku, item, infoMap);
        if (leafletName) addLeafletCount(leafletCounts, leafletName);
        else withoutLeaflet++;
    }
    return { leafletCounts, withoutLeaflet };
}

function estimateCardHeightForItem(item, settings = DEFAULT_SETTINGS) {
    const rows = Array.isArray(item?.variants) ? item.variants.length : 0;
    const minCardHeight = Number(settings?.MIN_CARD_HEIGHT) || 135;
    const baseRows = Number(settings?.BASE_CARD_ROWS) || 6;
    const rowGrowth = Number(settings?.ESTIMATED_ROW_HEIGHT) || 10;
    if (rows <= baseRows) return minCardHeight;
    return minCardHeight + ((rows - baseRows) * rowGrowth);
}

function estimatePagesForGroups(groups, settings, useCoverShift) {
    const a4h = Number(settings?.A4_H) || DEFAULT_SETTINGS.A4_H;
    const padY = Number(settings?.PAD_Y) || DEFAULT_SETTINGS.PAD_Y;
    const shift = useCoverShift ? Math.round(a4h * (Number(settings?.FIRST_PAGE_SHIFT_DEFAULT) || DEFAULT_SETTINGS.FIRST_PAGE_SHIFT_DEFAULT)) : 0;
    const itemGap = Number(settings?.ITEM_GAP) || 0;
    let pages = 1;
    let colIndex = 0;
    let colHeights = [shift, shift];
    const maxH = Math.max(1, a4h - (padY * 2));
    for (const item of groups) {
        const cardH = estimateCardHeightForItem(item, settings);
        const need = cardH + (colHeights[colIndex] > shift ? itemGap : 0);
        if (colHeights[colIndex] + need > maxH) {
            if (colIndex === 0) {
                colIndex = 1;
            } else {
                pages++;
                colIndex = 0;
                colHeights = [0, 0];
            }
        }
        colHeights[colIndex] += cardH + (colHeights[colIndex] > 0 ? itemGap : 0);
    }
    return pages;
}

function logLeafletPreviewAndPageEstimate(sourceGroups, infoMap) {
    const { leafletCounts, withoutLeaflet } = buildLeafletCounts(sourceGroups, infoMap);
    const settings = getSettingsFromUI();
    logMessage("Листовки:");
    logMessage(`  Общая: ${sourceGroups.length} товаров, примерно ${estimatePagesForGroups(sourceGroups, settings, true)} стр.`);
    for (const { title, count } of [...leafletCounts.values()].sort((a, b) => a.title.localeCompare(b.title, "ru"))) {
        const groups = sourceGroups.filter(item => {
            const mainSku = item && item.variants && item.variants.length > 0 ? item.variants[0].sku : null;
            return normalizeLeafletKey(resolveLeafletName(mainSku, item, infoMap)) === normalizeLeafletKey(title);
        });
        logMessage(`  ${title}: ${count} товаров, примерно ${estimatePagesForGroups(groups, settings, false)} стр.`);
    }
    if (withoutLeaflet > 0) logMessage(`  Без листовки: ${withoutLeaflet}`);
}

function logPreflight(jsonData, infoMap, sourceGroups) {
    const jsonSkus = collectJsonSkus(jsonData);
    const diff = summarizeSkuDiff(jsonSkus, infoMap);
    const isBox = isBoxInfoMap(infoMap);
    const { leafletCounts } = isBox ? { leafletCounts: new Map() } : buildLeafletCounts(sourceGroups, infoMap);
    let surpriseCount = 0;
    for (const item of sourceGroups) {
        const mainSku = item && item.variants && item.variants.length > 0 ? item.variants[0].sku : null;
        if (resolveSurpriseText(mainSku, item, infoMap)) surpriseCount++;
    }
    if (isBox) {
        const rowsCount = sourceGroups.reduce((sum, item) => sum + (Array.isArray(item?.variants) ? item.variants.length : 0), 0);
        logMessage(`Тип акции: коробочная`);
        logMessage(`К генерации: ${sourceGroups.length} карточек, ${rowsCount} строк`);
        logMessage(`CSV строк: ${Object.keys(infoMap || {}).length}`);
    } else {
        logMessage(`К генерации: ${sourceGroups.length} товаров`);
        logMessage(`CSV строк: ${Object.keys(infoMap || {}).length}, листовок в текущем наборе: ${leafletCounts.size}`);
        logLeafletPreviewAndPageEstimate(sourceGroups, infoMap);
    }
    if (surpriseCount > 0) logMessage(`Подарочные условия: ${surpriseCount}`);
    if (diff.csvMissingInJson) {
        logMessage(`Сверка SKU: в CSV не найдено в JSON ${diff.csvMissingInJson}`);
    }
}

function hasDiscountForItem(mainSku, item, infoMap) {
    if (mainSku && String(infoMap?.[mainSku]?.discount || "").trim()) return true;
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    return variants.some(variant => {
        const sku = variant?.sku;
        return sku && String(infoMap?.[sku]?.discount || "").trim();
    });
}

function hasInfoValueForItem(mainSku, item, infoMap, fields) {
    const hasValue = sku => fields.some(field => String(infoMap?.[sku]?.[field] || "").trim());
    if (mainSku && hasValue(mainSku)) return true;
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    return variants.some(variant => variant?.sku && hasValue(variant.sku));
}

function getProblemSku(mainSku, item) {
    if (mainSku) return String(mainSku);
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    const firstSku = variants.find(variant => variant?.sku)?.sku;
    return firstSku ? String(firstSku) : (item?.title || "без артикула");
}

function collectDataProblems(jsonData, infoMap, sourceGroups, imageResults = null) {
    if (window.PtechDiagnostics && window.PtechProducts) {
        return window.PtechDiagnostics.collectDataProblems(jsonData, infoMap, sourceGroups, imageResults, BRAND_IDS);
    }
    const jsonSkus = collectJsonSkus(jsonData);
    const csvSkus = new Set(Object.keys(infoMap || {}).map(s => String(s).trim()).filter(Boolean));
    const isBox = isBoxInfoMap(infoMap);
    const problems = {
        noPhoto: [],
        noDiscount: [],
        noPrice: [],
        noBoxPrice: [],
        noBoxQty: [],
        noLeaflet: [],
        unknownBrand: [],
        jsonMissingInCsv: [],
        csvMissingInJson: [],
        duplicateSkus: Array.isArray(infoMap?.__duplicateSkus) ? infoMap.__duplicateSkus : []
    };
    for (const sku of jsonSkus) {
        if (!csvSkus.has(sku)) problems.jsonMissingInCsv.push(sku);
    }
    for (const sku of csvSkus) {
        if (!jsonSkus.has(sku)) problems.csvMissingInJson.push(sku);
    }
    const groups = Array.isArray(sourceGroups) ? sourceGroups : [];
    for (let i = 0; i < groups.length; i++) {
        const item = groups[i];
        const mainSku = item && item.variants && item.variants.length > 0 ? item.variants[0].sku : null;
        const label = getProblemSku(mainSku, item);
        if (imageResults && !imageResults[i]) problems.noPhoto.push(label);
        if (isBox) {
            if (!hasInfoValueForItem(mainSku, item, infoMap, ["boxPrice", "price"])) problems.noBoxPrice.push(label);
            if (!hasInfoValueForItem(mainSku, item, infoMap, ["multiplicity", "boxQty"])) problems.noBoxQty.push(label);
        } else {
            if (!hasDiscountForItem(mainSku, item, infoMap)) problems.noDiscount.push(label);
            if (!hasInfoValueForItem(mainSku, item, infoMap, ["price"])) problems.noPrice.push(label);
            if (!resolveLeafletName(mainSku, item, infoMap)) problems.noLeaflet.push(label);
        }
        const brand = item?.brand !== undefined && item?.brand !== null ? String(item.brand) : "";
        if (brand && !BRAND_IDS.has(brand)) problems.unknownBrand.push(`${label} (brand ${brand})`);
    }
    return problems;
}

function logProblemList(title, items) {
    const list = Array.isArray(items) ? items : [];
    if (list.length === 0) return false;
    logMessage(`${title}: ${list.length}`);
    return true;
}

function logProblemListWithSku(title, items, limit = 40) {
    const list = Array.isArray(items) ? items : [];
    if (list.length === 0) return false;
    logMessage(`${title}: ${list.length}`);
    const shown = list.slice(0, limit).join(", ");
    const suffix = list.length > limit ? " ..." : "";
    logMessage(`${shown}${suffix}`);
    return true;
}

function logDataProblemReport(jsonData, infoMap, sourceGroups, imageResults = null) {
    const problems = collectDataProblems(jsonData, infoMap, sourceGroups, imageResults);
    const isBox = isBoxInfoMap(infoMap);
    let hasProblems = false;
    logMessage("Отчет по проблемам:");
    if (imageResults) {
        hasProblems = logProblemListWithSku("Без фото", problems.noPhoto) || hasProblems;
    }
    if (isBox) {
        hasProblems = logProblemListWithSku("Без коробочной цены", problems.noBoxPrice) || hasProblems;
        hasProblems = logProblemListWithSku("Без кратности", problems.noBoxQty) || hasProblems;
        hasProblems = logProblemListWithSku("Без пары цен для выгоды", problems.noBoxDiscountPair || []) || hasProblems;
        const benefit = problems.boxBenefit || {};
        if (benefit.suspicious > 0) {
            logMessage(`Цена коробкой выше/равна базовой: ${benefit.suspicious}`);
            hasProblems = true;
        }
        if (benefit.invalidPrice > 0) {
            logMessage(`Некорректные цены: ${benefit.invalidPrice}`);
            hasProblems = true;
        }
    } else {
        hasProblems = logProblemListWithSku("Без скидки в CSV", problems.noDiscount) || hasProblems;
        hasProblems = logProblemListWithSku("Без цены", problems.noPrice) || hasProblems;
        hasProblems = logProblemListWithSku("Без листовки", problems.noLeaflet) || hasProblems;
    }
    hasProblems = logProblemListWithSku("Дубли SKU в таблице", problems.duplicateSkus) || hasProblems;
    hasProblems = logProblemListWithSku("Неизвестный бренд", problems.unknownBrand) || hasProblems;
    hasProblems = logProblemListWithSku("Некорректная цена", problems.invalidPrice || []) || hasProblems;
    hasProblems = logProblemListWithSku("Подозрительная скидка", problems.suspiciousDiscount || []) || hasProblems;
    hasProblems = logProblemListWithSku("Коробочная цена выше/равна базовой", problems.suspiciousBoxPrice || []) || hasProblems;
    hasProblems = logProblemListWithSku("CSV SKU без товара JSON", problems.csvMissingInJson) || hasProblems;
    if (!hasProblems) logMessage("Проблем не найдено");
}

function logCatalogSheetCheck(products, parsedOrder) {
    const orderList = parsedOrder?.orderList || [];
    const infoMap = parsedOrder?.infoMap || {};
    const sourceGroups = selectProductsForGeneration(products, orderList, infoMap);
    logPreflight(products, infoMap, sourceGroups);

function createBuildContext(jsonData, parsedOrder, options = {}, limitCount = null) {
    const orderList = parsedOrder.orderList || [];
    const infoMap = parsedOrder.infoMap || {};
    const orderedProducts = selectProductsForGeneration(jsonData, orderList, infoMap);
    const total = orderedProducts.length;
    const sourceGroups = options.leafletSample
        ? pickLeafletTestGroups(orderedProducts, infoMap, 2)
        : orderedProducts.slice(0, limitCount && Number.isFinite(limitCount) ? Math.min(total, limitCount) : total);
    return {
        products: jsonData,
        orderList,
        infoMap,
        orderedProducts,
        sourceGroups,
        isBox: isBoxInfoMap(infoMap)
    };
}

function buildFigmaPayloadGroups(sourceGroups, mainSkus, imageResults, infoMap, promoType = "auto") {
    const processedGroups = [];
    for (let i = 0; i < sourceGroups.length; i++) {
        const item = sourceGroups[i];
        const mainSku = mainSkus[i];
        const media = normalizeProductMediaResult(imageResults[i]);
        const imageBytes = media.imageBytes;
        const productUrl = media.url || null;
        const videoUrl = extractFirstVideoUrl(item);
        const mainDiscount = mainSku && infoMap[mainSku] ? infoMap[mainSku].discount : null;
        const mainConditions = mainSku && infoMap[mainSku] ? infoMap[mainSku].conditions : null;
        const mainSurprise = resolveSurpriseText(mainSku, item, infoMap);
        const mainLeafletName = resolveLeafletName(mainSku, item, infoMap);
        const mainMultiplicity = resolveInfoField(mainSku, item, infoMap, 'multiplicity');
        const mainBoxQty = mainMultiplicity || resolveInfoField(mainSku, item, infoMap, 'boxQty');
        const mainBoxPrice = resolveInfoField(mainSku, item, infoMap, 'boxPrice') || (mainSku && infoMap[mainSku] ? infoMap[mainSku].price : null);
        const mainBoxNotice = resolveInfoField(mainSku, item, infoMap, 'boxNotice');
        const isBoxCard = promoType === "box" || (promoType === "auto" && hasBoxInfo(mainSku, item, infoMap));
        const mainPrice = mainSku && infoMap[mainSku] ? infoMap[mainSku].price : null;
        const boxDiscount = isBoxCard ? calculateBoxDiscountPercent(mainPrice, mainBoxPrice) : null;
        processedGroups.push({
            cardType: isBoxCard ? "box" : "default",
            headerName: item.title,
            descriptionText: item.description,
            imageBytes,
            discountText: isBoxCard ? (boxDiscount !== null ? String(boxDiscount) : null) : (mainDiscount || null),
            discountInfoText: mainSurprise ? null : (mainConditions || null),
            surpriseText: mainSurprise || null,
            boxPriceText: mainBoxPrice || null,
            multiplicityText: mainMultiplicity || null,
            boxQtyText: mainBoxQty || null,
            boxNoticeText: mainBoxNotice || null,
            videoUrl,
            productUrl,
            mainSku,
            leafletName: mainLeafletName || null,
            brandId: item.brand,
            items: item.variants.map(v => ({
                sku: v.sku,
                specs: v.specs,
                min: v.min,
                qty: v.qty,
                price: cleanPrice(v.price),
                discount: infoMap?.[v.sku]?.discount || null,
                boxPrice: infoMap?.[v.sku]?.boxPrice || infoMap?.[v.sku]?.price || null,
                multiplicity: infoMap?.[v.sku]?.multiplicity || null,
                boxQty: infoMap?.[v.sku]?.boxQty || null,
                boxNotice: infoMap?.[v.sku]?.boxNotice || null,
                productUrl
            }))
        });
    }
    return processedGroups;
}

function normalizeProductMediaResult(result) {
    if (!result) return { imageBytes: null, url: null, category: null };
    if (result instanceof Uint8Array) return { imageBytes: result, url: null, category: null };
    return {
        imageBytes: result.imageBytes || null,
        url: normalizeUrl(result.url || result.productUrl || ""),
        category: result.category || null
    };
}

function getImageBytesResults(mediaResults) {
    return (mediaResults || []).map(result => normalizeProductMediaResult(result).imageBytes || null);
}

function countLoadedImages(mediaResults) {
    return getImageBytesResults(mediaResults).filter(Boolean).length;
}

function extractFirstVideoUrl(item) {
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    for (const variant of variants) {
        const url = extractVideoUrlFromVariant(variant);
        if (url) return url;
    }
    return null;
}

function extractVideoUrlFromVariant(variant) {
    const raw = getVariantPropertyValue(variant, "Видео");
    if (!raw) return null;
    const text = String(raw);
    const srcMatch = text.match(/\bsrc\\?=\\?[\"']([^\"']+)[\"']/i) || text.match(/\bsrc\s*=\s*[\"']([^\"']+)[\"']/i);
    return normalizeUrl(srcMatch ? srcMatch[1] : text);
}

function getVariantPropertyValue(variant, propertyName) {
    const target = normalizePropertyName(propertyName);
    const props = Array.isArray(variant?.properties) ? variant.properties : [];
    for (const prop of props) {
        if (normalizePropertyName(prop?.propertyname) === target) {
            return prop?.propertyvalue;
        }
    }
    return "";
}

function normalizePropertyName(value) {
    return String(value || "")
        .replace(/[:：]+$/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
}

function normalizeUrl(value) {
    const text = String(value || "").replace(/\\\//g, "/").trim();
    return /^https?:\/\//i.test(text) ? text : "";
}

function getMainSkusForGroups(sourceGroups) {
    return sourceGroups.map(item => (
        item && item.variants && item.variants.length > 0 ? item.variants[0].sku : null
    ));
}

function createSheetContexts(jsonData, options = {}, limitCount = null) {
    const loaded = getLoadedGoogleSheets();
    if (loaded.length === 0) return [];
    return loaded.map(sheet => {
        const parsedOrder = sheet.parsedOrder || parseOrderFileBest([sheet.csv]);
        const context = createBuildContext(jsonData, parsedOrder, options, limitCount);
        return {
            id: sheet.id,
            title: sheet.sheetName || sheet.gid || "Google лист",
            promoType: detectPromoTypeFromSheetName(sheet.sheetName || sheet.gid || ""),
            csv: sheet.csv,
            parsedOrder,
            context
        };
    });
}

function detectPromoTypeFromSheetName(name) {
    const text = String(name || "").toLowerCase();
    if (text.includes("короб")) return "box";
    if (text.includes("фикс") || /\bfix\b/.test(text)) return "fixed";
    return "common";
}

function getPromoTypeLabel(promoType) {
    if (promoType === "box") return "коробочная";
    if (promoType === "fixed") return "фикс";
    return "обычная";
}

function mergeSheetContextsInfoMap(sheetContexts) {
    return mergeInfoMaps(sheetContexts.map(item => item.context?.infoMap || {}));
}

function buildMultiRunPayload(sheetContexts, allImageResults) {
    const runs = [];
    let imageOffset = 0;
    for (const sheet of sheetContexts) {
        const sourceGroups = sheet.context.sourceGroups;
        const mainSkus = getMainSkusForGroups(sourceGroups);
        const imageSlice = allImageResults.slice(imageOffset, imageOffset + sourceGroups.length);
        imageOffset += sourceGroups.length;
        const groups = buildFigmaPayloadGroups(sourceGroups, mainSkus, imageSlice, sheet.context.infoMap, sheet.promoType);
        if (sheet.promoType === "common") {
            runs.push({
                title: sheet.title,
                groups,
                orderList: sheet.context.orderList,
                infoMap: sheet.context.infoMap,
                promoType: sheet.promoType
            });

            const byLeaflet = new Map();
            for (const group of groups) {
                const title = String(group.leafletName || "").replace(/\s+/g, " ").trim();
                if (!title) continue;
                const key = normalizeLeafletKey(title);
                const entry = byLeaflet.get(key) || { title, groups: [] };
                entry.groups.push(group);
                byLeaflet.set(key, entry);
            }
            if (byLeaflet.size > 1) {
                for (const entry of byLeaflet.values()) {
                    runs.push({
                        title: entry.title,
                        groups: entry.groups,
                        orderList: sheet.context.orderList,
                        infoMap: sheet.context.infoMap,
                        promoType: sheet.promoType
                    });
                }
            }
            continue;
        }

        runs.push({
            title: sheet.title,
            groups,
            orderList: sheet.context.orderList,
            infoMap: sheet.context.infoMap,
            promoType: sheet.promoType
        });
    }
    return runs;
}

function countLeafletNames(infoMap) {
    let count = 0;
    for (const entry of Object.values(infoMap || {})) {
        if (String(entry?.leafletName || "").trim()) count++;
    }
    return count;
}

function parseOrderFileBest(texts) {
    let best = { orderList: [], infoMap: {}, score: -1 };
    for (const text of texts) {
        const orderList = parseOrderList(text);
        const infoMap = parseUpdateInfo(text);
        const score = countLeafletNames(infoMap) * 1000 + Object.keys(infoMap).length + orderList.length;
        if (score > best.score) {
            best = { orderList, infoMap, score };
        }
    }
    return best;
}

function getLoadedGoogleSheets() {
    return [...googleLoadedSheets.values()].filter(item => item && item.csv);
}

function getLoadedSheetsLabel() {
    const loaded = getLoadedGoogleSheets();
    if (loaded.length === 0) return "Лист не загружен";
    if (loaded.length === 1) return `Лист загружен: ${loaded[0].sheetName || loaded[0].gid || "Google"}`;
    return `Листов загружено: ${loaded.length}`;
}

function syncPrimaryGoogleState() {
    const loaded = getLoadedGoogleSheets();
    const primary = googleLoadedSheets.get("primary") || loaded[0] || null;
    googleOrderCsvText = primary?.csv || "";
    googleOrderSheetName = primary?.sheetName || "";
}

function mergeInfoMaps(maps) {
    const merged = {};
    for (const map of maps) {
        for (const [sku, entry] of Object.entries(map || {})) {
            if (sku === "__duplicateSkus") {
                const next = Array.isArray(entry) ? entry : [];
                merged.__duplicateSkus = [...(merged.__duplicateSkus || []), ...next];
                continue;
            }
            merged[sku] = entry;
        }
    }
    return merged;
}

function updateCombinedOrderSummary() {
    const loaded = getLoadedGoogleSheets();
    if (loaded.length === 0) {
        currentOrderInfoMap = {};
        updateOrderSummary(currentOrderInfoMap, currentJsonCount);
        return;
    }
    if (loaded.length > 1) {
        currentOrderInfoMap = mergeInfoMaps(loaded.map(item => item.parsedOrder?.infoMap || {}));
        updateMultiSheetSummary(loaded);
        return;
    }
    const infoMap = mergeInfoMaps(loaded.map(item => item.parsedOrder?.infoMap || {}));
    currentOrderInfoMap = infoMap;
    updateOrderSummary(infoMap, currentJsonCount, loaded[0]?.promoType || "auto");
    appendSingleSheetValidation(loaded[0]);
}

function updateMultiSheetSummary(loadedSheets) {
    const summary = document.getElementById('orderSummary');
    if (!summary) return;
    const rows = loadedSheets.map(sheet => {
        const infoMap = sheet.parsedOrder?.infoMap || {};
        const entries = Object.entries(infoMap);
        const leafletCounts = new Map();
        for (const [, entry] of entries) {
            const name = String(entry?.leafletName || "").trim();
            if (name) addLeafletCount(leafletCounts, name);
        }
        const validation = getLoadedSheetValidation(sheet);
        const details = sheet.promoType === "common"
            ? `листовок: ${leafletCounts.size}`
            : `строк: ${entries.length}`;
        return `
            <div style="margin-top: 6px;">
                <strong>${escapeHtml(sheet.sheetName || sheet.gid || "Google лист")}</strong><br>
                Тип: ${escapeHtml(getPromoTypeLabel(sheet.promoType))}, товаров: ${entries.length}, ${details}<br>
                ${validation.ok ? "Готово к генерации" : `Есть проблемы: ${validation.count}`}
            </div>
        `;
    }).join("");
    summary.innerHTML = `
        <div>Загружено листов: <strong>${loadedSheets.length}</strong></div>
        ${rows}
    `;
    summary.classList.add('show');
}

function getLoadedSheetValidation(sheet) {
    const jsonData = getEmbeddedProducts();
    const parsedOrder = sheet?.parsedOrder || parseOrderFileBest([sheet?.csv || ""]);
    const sourceGroups = selectProductsForGeneration(jsonData, parsedOrder.orderList || [], parsedOrder.infoMap || {});
    const problems = collectDataProblems(jsonData, parsedOrder.infoMap || {}, sourceGroups, null);
    const count = (problems.csvMissingInJson?.length || 0) +
        (problems.duplicateSkus?.length || 0) +
        (sheet?.promoType === "box" ? (problems.noBoxPrice?.length || 0) + (problems.noBoxQty?.length || 0) : 0) +
        (sheet?.promoType === "common" ? (problems.noDiscount?.length || 0) + (problems.noPrice?.length || 0) : 0);
    return { ok: count === 0 && sourceGroups.length > 0, count: sourceGroups.length > 0 ? count : count + 1 };
}

function appendSingleSheetValidation(sheet) {
    const summary = document.getElementById('orderSummary');
    if (!summary || !sheet) return;
    const validation = getLoadedSheetValidation(sheet);
    const status = validation.ok ? "Готово к генерации" : `Есть проблемы: ${validation.count}`;
    summary.innerHTML += `<div style="margin-top: 6px;">${escapeHtml(status)}</div>`;
    summary.classList.add('show');
}

function populateGoogleSheetSelect(select, selectedValue = "") {
    if (!select) return;
    const current = selectedValue || select.value || "";
    select.innerHTML = '<option value="">Лист не выбран</option>';
    for (const sheet of googleSheetsList || []) {
        const option = document.createElement('option');
        option.value = String(sheet.gid || "");
        option.textContent = String(sheet.name || sheet.gid || "");
        select.appendChild(option);
    }
    select.value = current;
}

function refreshGoogleSheetSelects() {

        populateGoogleSheetSelect(select);
    });
}

function createGoogleSheetRow() {
    const rows = document.getElementById('googleSheetRows');
    if (!rows) return;
    const id = `sheet_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
    const row = document.createElement('div');
    row.className = 'sheet-picker-row';
    row.dataset.sheetRow = id;

    const select = document.createElement('select');
    select.dataset.sheetSelect = "1";
    select.dataset.sheetId = id;
    populateGoogleSheetSelect(select);
    select.addEventListener('change', () => handleGoogleSheetSelection(select));

    const remove = document.createElement('button');
    remove.type = 'button';
    remove.className = 'secondary sheet-remove-btn';
    remove.title = "Удалить лист";
    remove.textContent = "×";
    remove.addEventListener('click', () => {
        googleLoadedSheets.delete(id);
        row.remove();
        syncPrimaryGoogleState();
        updateCombinedOrderSummary();
        const label = document.getElementById('orderFileName');
        if (label) label.textContent = getLoadedSheetsLabel();
    });

    row.appendChild(select);
    row.appendChild(remove);
    rows.appendChild(row);

function handleGoogleSheetSelection(select) {
    const id = select?.dataset?.sheetId || "primary";
    const gid = select?.value || "";
    if (!gid) {
        googleLoadedSheets.delete(id);
        syncPrimaryGoogleState();
        updateCombinedOrderSummary();
        const label = document.getElementById('orderFileName');
        if (label) label.textContent = getLoadedSheetsLabel();
        return;
    }
    const duplicate = [...document.querySelectorAll('[data-sheet-select]')]
        .some(other => other !== select && other.value === gid);
    if (duplicate) {
        showError("Этот Google-лист уже выбран");
        select.value = "";
        googleLoadedSheets.delete(id);
        syncPrimaryGoogleState();
        updateCombinedOrderSummary();
        const label = document.getElementById('orderFileName');
        if (label) label.textContent = getLoadedSheetsLabel();
        return;
    }
    loadGoogleCsv(select);
}

function resolveLeafletName(mainSku, item, infoMap) {
    if (window.PtechDiagnostics) return window.PtechDiagnostics.resolveLeafletName(mainSku, item, infoMap);
    if (mainSku && infoMap?.[mainSku]?.leafletName) {
        return infoMap[mainSku].leafletName;
    }
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    for (const variant of variants) {
        const sku = variant?.sku;
        if (sku && infoMap?.[sku]?.leafletName) {
            return infoMap[sku].leafletName;
        }
    }
    return "";
}

function resolveSurpriseText(mainSku, item, infoMap) {
    if (window.PtechDiagnostics) return window.PtechDiagnostics.resolveSurpriseText(mainSku, item, infoMap);
    if (mainSku && infoMap?.[mainSku]?.surpriseText) {
        return infoMap[mainSku].surpriseText;
    }
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    for (const variant of variants) {
        const sku = variant?.sku;
        if (sku && infoMap?.[sku]?.surpriseText) {
            return infoMap[sku].surpriseText;
        }
    }
    return "";
}

function resolveInfoField(mainSku, item, infoMap, fieldName) {
    if (window.PtechDiagnostics) return window.PtechDiagnostics.resolveInfoField(mainSku, item, infoMap, fieldName);
    if (mainSku && infoMap?.[mainSku]?.[fieldName]) {
        return infoMap[mainSku][fieldName];
    }
    const variants = Array.isArray(item?.variants) ? item.variants : [];
    for (const variant of variants) {
        const sku = variant?.sku;
        if (sku && infoMap?.[sku]?.[fieldName]) {
            return infoMap[sku][fieldName];
        }
    }
    return "";
}

function hasBoxInfo(mainSku, item, infoMap) {
    if (window.PtechDiagnostics) return window.PtechDiagnostics.hasBoxInfo(mainSku, item, infoMap);
    return !!(
        resolveInfoField(mainSku, item, infoMap, 'multiplicity') ||
        resolveInfoField(mainSku, item, infoMap, 'boxQty') ||
        resolveInfoField(mainSku, item, infoMap, 'boxNotice')
    );
}

function updateOrderSummary(infoMap, jsonCount = null, promoType = "auto") {
    const summary = document.getElementById('orderSummary');
    if (!summary) return;

    const entries = Object.entries(infoMap || {});
    if (entries.length === 0) {
        summary.classList.remove('show');
        summary.innerHTML = "";
        return;
    }

    const leafletCounts = new Map();
    let withoutLeaflet = 0;
    let surpriseCount = 0;
    let boxCount = 0;
    for (const [, entry] of entries) {
        if (String(entry?.surpriseText || "").trim()) surpriseCount++;
        if (String(entry?.multiplicity || entry?.boxQty || entry?.boxNotice || "").trim()) boxCount++;
        const name = String(entry?.leafletName || "").trim();
        if (!name) {
            withoutLeaflet++;
            continue;
        }
        addLeafletCount(leafletCounts, name);
    }

    const leafletList = [...leafletCounts.values()]
        .sort((a, b) => a.title.localeCompare(b.title, "ru"))
        .map(item => `${escapeHtml(item.title)}: ${item.count}`)
        .join("<br>");
    if (promoType === "fixed") {
        summary.innerHTML = `
            <div>Тип акции: <strong>фикс</strong></div>
            <div>CSV строк с кодами: <strong>${entries.length}</strong></div>
            ${surpriseCount > 0 ? `<div>Подарочных условий: <strong>${surpriseCount}</strong></div>` : ""}
        `;
    } else if (promoType === "box" || (promoType === "auto" && boxCount > 0)) {
        summary.innerHTML = `
            <div>Тип акции: <strong>коробочная</strong></div>
            <div>CSV строк с кодами: <strong>${entries.length}</strong></div>
            <div>Коробочных строк: <strong>${boxCount}</strong></div>
            ${surpriseCount > 0 ? `<div>Подарочных условий: <strong>${surpriseCount}</strong></div>` : ""}
        `;
    } else {
        summary.innerHTML = `
            <div>Тип акции: <strong>обычная</strong></div>
            <div>CSV строк с кодами: <strong>${entries.length}</strong></div>
            <div>Листовок: <strong>${leafletCounts.size}</strong></div>
            <div>Подарочных условий: <strong>${surpriseCount}</strong></div>
            <div>Без названия листовки: <strong>${withoutLeaflet}</strong></div>
            ${leafletList ? `<div style="margin-top: 6px;">${leafletList}</div>` : ""}
        `;
    }
    summary.classList.add('show');
}

function escapeHtml(value) {

async function fetchImageForProduct(sku, signal) {
    for (let attempt = 0; attempt <= IMAGE_FETCH_RETRIES; attempt++) {
        const result = await fetchImageForProductOnce(sku, signal);
        if (result || signal?.aborted) return result;
        if (attempt < IMAGE_FETCH_RETRIES) await delay(350);
    }
    return null;
}

async function fetchImageForProductOnce(sku, signal) {
    if (!sku) return null;
    try {
        if (signal?.aborted) return null;
        const cacheKey = `${sku}:${imageCacheBust}`;
        if (imageCache.has(cacheKey)) return imageCache.get(cacheKey);
        await ensureProxyWarm();
        if (signal?.aborted) return null;
        const apiUrl = API_BASE + encodeURIComponent(sku);
        const proxyApiUrl = PROXY_BASE + encodeURIComponent(addCacheBust(apiUrl, imageCacheBust));
        let apiResponse = await fetch(proxyApiUrl, { signal, cache: "no-store" });
        if (!apiResponse.ok) {
            apiResponse = await fetch(PROXY_BASE + encodeURIComponent(apiUrl), { signal, cache: "no-store" });
        }
        if (!apiResponse.ok) return null;
        const apiData = await apiResponse.json();
        const meta = getProductMetaFromApiData(apiData, sku);
        const imageUrl = meta.image || "";
        if (!imageUrl) return null;
        if (signal?.aborted) return null;
        const realImageUrl = imageUrl;
        const proxyImageUrl = PROXY_BASE + encodeURIComponent(addCacheBust(realImageUrl, imageCacheBust));
        let imgResponse = await fetch(proxyImageUrl, { signal, cache: "no-store" });
        if (!imgResponse.ok) {
            imgResponse = await fetch(PROXY_BASE + encodeURIComponent(realImageUrl), { signal, cache: "no-store" });
        }
        if (!imgResponse.ok) return null;
        const imgBlob = await imgResponse.blob();
        const imgBuffer = await imgBlob.arrayBuffer();
        if (imgBuffer.byteLength < 50) return null;
        let bytes = new Uint8Array(imgBuffer);
        if (TRIM_IMAGE_WHITESPACE) {
            bytes = await trimImageWhitespace(bytes, sku) || bytes;
        }
        const result = {
            imageBytes: bytes,
            url: meta.url || null,
            category: meta.category || null
        };
        imageCache.set(cacheKey, result);
        return result;
    } catch (err) {
        if (err?.name === "AbortError") return null;
        logMessage(`Ошибка фото ${sku}: ${err.message}`);
        return null;
    }
}

async function fetchImagesForProducts(skus, signal, onProgress, shouldCancel) {
    const batchResults = await fetchImageBatch(skus, signal);
    if (batchResults) {
        const results = new Array(skus.length).fill(null);
        await mapWithConcurrency(
            skus,
            IMAGE_FETCH_CONCURRENCY,
            async (sku, index) => {
                if (!sku) return null;
                const meta = batchResults.get(String(sku).trim());
                const imageUrl = meta?.image || "";
                const imageBytes = imageUrl ? await fetchImageBytesFromUrlWithRetry(imageUrl, signal, sku) : null;
                results[index] = imageBytes ? {
                    imageBytes,
                    url: meta?.url || null,
                    category: meta?.category || null
                } : null;
                return results[index];
            },
            onProgress,
            shouldCancel
        );
        return results;
    }
    return mapWithConcurrency(
        skus,
        IMAGE_FETCH_CONCURRENCY,
        async (sku) => fetchImageForProduct(sku, signal),
        onProgress,
        shouldCancel
    );
}

async function fetchImageBatch(skus, signal) {
    const cleanSkus = (skus || []).filter(Boolean).map(sku => String(sku).trim());
    if (cleanSkus.length < 2) return null;
    try {
        const endpointUrl = API_BASE.replace(/\?article=$/, "");
        let response = await fetch(PROXY_API_BASE + encodeURIComponent(addCacheBust(endpointUrl, imageCacheBust)), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ articles: cleanSkus }),
            signal,
            cache: "no-store"
        });
        if (!response.ok) {
            const apiUrl = API_BASE + encodeURIComponent(cleanSkus.join(","));
            response = await fetch(PROXY_BASE + encodeURIComponent(addCacheBust(apiUrl, imageCacheBust)), { signal, cache: "no-store" });
        }
        if (!response.ok) return null;
        const apiData = await response.json();
        if (!apiData?.data || typeof apiData.data !== "object" || apiData.data.image) return null;
        const map = new Map();
        for (const sku of cleanSkus) {
            const entry = apiData.data[String(sku).trim()];
            const meta = normalizeApiProductEntry(entry);
            if (meta.image || meta.url || meta.category) map.set(sku, meta);
        }
        return map.size > 0 ? map : null;
    } catch {
        return null;
    }
}

async function fetchImageBytesFromUrl(imageUrl, signal, sku = "") {
    if (!imageUrl) return null;
    const proxyImageUrl = PROXY_BASE + encodeURIComponent(addCacheBust(imageUrl, imageCacheBust));
    let response = await fetch(proxyImageUrl, { signal, cache: "no-store" });
    if (!response.ok) response = await fetch(PROXY_BASE + encodeURIComponent(imageUrl), { signal, cache: "no-store" });
    if (!response.ok) return null;
    const blob = await response.blob();
    const buffer = await blob.arrayBuffer();
    if (buffer.byteLength < 50) return null;
    let bytes = new Uint8Array(buffer);
    if (TRIM_IMAGE_WHITESPACE) bytes = await trimImageWhitespace(bytes, sku) || bytes;
    return bytes;
}

async function fetchImageBytesFromUrlWithRetry(imageUrl, signal, sku = "") {
    for (let attempt = 0; attempt <= IMAGE_FETCH_RETRIES; attempt++) {
        const result = await fetchImageBytesFromUrl(imageUrl, signal, sku);
        if (result || signal?.aborted) return result;
        if (attempt < IMAGE_FETCH_RETRIES) await delay(350);
    }
    return null;
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function getImageUrlFromApiData(apiData, sku) {
    return getProductMetaFromApiData(apiData, sku).image || "";
}

function getProductMetaFromApiData(apiData, sku) {
    if (!apiData || !apiData.data) return normalizeApiProductEntry(null);
    if (apiData.data.image) return normalizeApiProductEntry(apiData.data);
    const skuEntry = apiData.data[String(sku || "").trim()];
    if (skuEntry) return normalizeApiProductEntry(skuEntry);
    const firstEntry = Object.values(apiData.data).find(entry => entry && (entry.image || entry.url));
    return normalizeApiProductEntry(firstEntry);
}

function normalizeApiProductEntry(entry) {
    return {
        image: normalizeUrl(entry?.image || ""),
        url: normalizeUrl(entry?.url || entry?.productUrl || ""),
        category: entry?.category || null
    };
}

async function trimImageWhitespace(bytes, sku = "") {
    try {
        const blob = new Blob([bytes]);
        const bitmap = await createImageBitmap(blob);
        const w = bitmap.width;
        const h = bitmap.height;
        if (w < 20 || h < 20) return null;

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        if (!ctx) return null;
        ctx.drawImage(bitmap, 0, 0);

        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        let minX = w;
        let minY = h;
        let maxX = -1;
        let maxY = -1;

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                if (!isNearWhitePixel(data[i], data[i + 1], data[i + 2], data[i + 3])) {
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (maxX < minX || maxY < minY) return null;

        const contentW = maxX - minX + 1;
        const contentH = maxY - minY + 1;
        const originalArea = w * h;
        const contentArea = contentW * contentH;
        if (contentArea / originalArea < 0.01) {
            smallImageObjectCount++;
            if (sku) smallImageObjectSkus.add(String(sku));
            return null;
        }
        if (contentArea / originalArea > 0.94) return null;
        if (contentW < w * 0.015 || contentH < h * 0.015) return null;

        const pad = Math.max(2, Math.round(Math.max(contentW, contentH) * 0.04));
        const sx = Math.max(0, minX - pad);
        const sy = Math.max(0, minY - pad);
        const ex = Math.min(w - 1, maxX + pad);
        const ey = Math.min(h - 1, maxY + pad);
        const cropW = ex - sx + 1;
        const cropH = ey - sy + 1;
        if (cropW >= w * 0.96 && cropH >= h * 0.96) return null;

        const shouldRotate = shouldRotateCroppedImage(cropW, cropH);
        const sourceW = shouldRotate ? cropH : cropW;
        const sourceH = shouldRotate ? cropW : cropH;
        const fitted = fitInside(sourceW, sourceH, PRODUCT_IMAGE_MAX_SIZE);
        const out = document.createElement("canvas");
        out.width = fitted.width;
        out.height = fitted.height;
        const outCtx = out.getContext("2d");
        if (!outCtx) return null;
        outCtx.imageSmoothingEnabled = true;
        outCtx.imageSmoothingQuality = "high";
        if (shouldRotate) {
            outCtx.translate(out.width, 0);
            outCtx.rotate(Math.PI / 2);
            outCtx.drawImage(canvas, sx, sy, cropW, cropH, 0, 0, out.height, out.width);
        } else {
            outCtx.drawImage(canvas, sx, sy, cropW, cropH, 0, 0, out.width, out.height);
        }

        const outBlob = await canvasToBlob(out, "image/png");
        if (!outBlob) return null;
        const outBuffer = await outBlob.arrayBuffer();
        if (outBuffer.byteLength < 50) return null;
        return new Uint8Array(outBuffer);
    } catch (err) {
        logMessage(`Обрезка фото не удалась: ${err.message}`);
        return null;
    }
}

function shouldRotateCroppedImage(width, height) {
    if (!width || !height) return false;
    return height / width >= 1.18;
}

function fitInside(width, height, maxSize) {
    if (!width || !height) return { width: maxSize, height: maxSize };
    const scale = Math.min(maxSize / width, maxSize / height);
    return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale))
    };
}

function isNearWhitePixel(r, g, b, a) {
    if (a < 20) return true;
    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    return r >= 244 && g >= 244 && b >= 244 && (max - min) <= 18;
}

function canvasToBlob(canvas, type) {
    return new Promise(resolve => canvas.toBlob(resolve, type));
}

function addCacheBust(url, value) {
    const glue = String(url).includes("?") ? "&" : "?";
    return `${url}${glue}_figma_cb=${encodeURIComponent(value)}`;
}

async function mapWithConcurrency(items, limit, worker, onProgress, shouldCancel) {
    const results = new Array(items.length);
    let nextIndex = 0;
    let completed = 0;

    async function run() {
        while (nextIndex < items.length) {
            if (shouldCancel && shouldCancel()) break;
            const current = nextIndex++;
            results[current] = await worker(items[current], current);
            completed++;
            if (onProgress) onProgress(completed, items.length, items[current], current);
        }
    }

    const workers = [];
    const count = Math.max(1, Math.min(limit, items.length));
    for (let i = 0; i < count; i++) {
        workers.push(run());
    }
    await Promise.all(workers);
    return results;
}

// --- ЗАПУСК ГЕНЕРАЦИИ (КНОПКА 1) ---
async function startGeneration(limitCount = null, options = {}) {
    const generationStartedAt = performance.now();
    resetCancellation();
    clearLog();
    lastGenerationStats = null;
    smallImageObjectCount = 0;
    smallImageObjectSkus.clear();
    imageCacheBust = Date.now();
    imageCache.clear();
    const giftBlockEnabled = true;
    const giftBlockMode = "startSecond";
    const skipImages = !!document.getElementById('skipImagesToggle')?.checked;
    
    const jsonData = getEmbeddedProducts();
    if (jsonData.length === 0) {
        showError("Встроенная база товаров пуста");
        return;
    }
    
    // Блокируем интерфейс
    disableButtons(true);
    showProgress(true);
    updateOrderSummary({});
    updateProgress(0, 100, "Чтение файлов...", "Инициализация");

    try {
        updateProgress(10, 100, "Подготовка базы...", "Встроенный каталог");
        currentJsonCount = jsonData.length;
        updateJsonSummary(currentJsonCount);

        const sheetContexts = createSheetContexts(jsonData, options, limitCount);
        if (sheetContexts.length === 0) {
            throw new Error("Загрузите лист Google");
        }
        updateProgress(12, 100, "Чтение CSV...", sheetContexts.length === 1 ? sheetContexts[0].title : `${sheetContexts.length} листа`);
        throwIfCancelled();

        for (const sheet of sheetContexts) {
            assertQualityGates(sheet.context);
        }
        const combinedInfoMap = mergeSheetContextsInfoMap(sheetContexts);
        const sourceGroups = sheetContexts.flatMap(sheet => sheet.context.sourceGroups);
        const orderList = sheetContexts.length === 1 ? sheetContexts[0].context.orderList : [];
        const infoMap = sheetContexts.length === 1 ? sheetContexts[0].context.infoMap : combinedInfoMap;
        if (options.leafletSample) {
            logMessage("Тест по листовкам: взято до 2 товаров на каждую листовку");
        }
        updateOrderSummary(
            infoMap,
            sourceGroups.length,
            sheetContexts.length === 1 ? sheetContexts[0].promoType : "auto"
        );
        if (sheetContexts.length > 1) {
            logMessage(`Google листов к генерации: ${sheetContexts.length}`);
            for (const sheet of sheetContexts) {
                logMessage(`${sheet.title}: ${sheet.context.sourceGroups.length} товаров`);
            }
        } else {
            logPreflight(jsonData, infoMap, sourceGroups);
        }

        const mainSkus = getMainSkusForGroups(sourceGroups);
        let imageResults = new Array(sourceGroups.length).fill(null);
        let imageFetchMs = 0;
        if (skipImages) {
            logMessage("Быстрый режим: картинки не скачиваются");
        } else {
            updateProgress(15, 100, "Поднимаем прокси...", "Подготовка к загрузке фото");
            await ensureProxyWarm();
            throwIfCancelled();

            updateProgress(20, 100, "Скачивание фото...", "Пакетная загрузка");
            const imageStartedAt = performance.now();
            imageResults = await fetchImagesForProducts(
                mainSkus,
                activeAbortController?.signal,
                (completed, count, sku) => {
                    if (generationCancelled) return;
                    if (completed === count || completed % 5 === 0) {
                        updateProgress(
                            20 + Math.round((completed / Math.max(1, count)) * 45),
                            100,
                            "Скачивание фото...",
                            sku ? `Артикул ${sku}` : "Без артикула"
                        );
                    }
                },
                () => generationCancelled
            );
            imageFetchMs = Math.round(performance.now() - imageStartedAt);
            const loadedImages = countLoadedImages(imageResults);
            logMessage(`Фото загружено: ${loadedImages} / ${sourceGroups.length}`);
            if (smallImageObjectSkus.size > 0) {
                const sample = [...smallImageObjectSkus].slice(0, 15).join(", ");
                logMessage(`Мелкие объекты на фото: ${smallImageObjectSkus.size}${sample ? ` (${sample}${smallImageObjectSkus.size > 15 ? " ..." : ""})` : ""}`);
            }
        }
        throwIfCancelled();
        if (sheetContexts.length > 1) {
            for (const sheet of sheetContexts) {
                logMessage(`Отчет: ${sheet.title}`);
                logDataProblemReport(jsonData, sheet.context.infoMap, sheet.context.sourceGroups, null);
            }
        } else {
            logDataProblemReport(jsonData, infoMap, sourceGroups, skipImages ? null : getImageBytesResults(imageResults));
        }

        const payloadStartedAt = performance.now();
        updateProgress(65, 100, "Сборка каталога...", "Подготовка данных");
        throwIfCancelled();
        const runPayloads = buildMultiRunPayload(sheetContexts, imageResults);
        const processedGroups = [];

        const statsGroups = runPayloads ? runPayloads.flatMap(run => run.groups) : processedGroups;
        const rowsCount = statsGroups.reduce((sum, group) => sum + (Array.isArray(group.items) ? group.items.length : 0), 0);
        const isBoxRun = statsGroups.some(group => group.cardType === "box");
        lastGenerationStats = {
            cards: statsGroups.length,
            rows: rowsCount,
            loadedImages: skipImages ? 0 : countLoadedImages(imageResults),
            totalImages: skipImages ? 0 : sourceGroups.length,
            skipImages,
            isBox: isBoxRun,
            smallImageObjectCount,
            imageFetchMs,
            payloadMs: Math.round(performance.now() - payloadStartedAt),
            totalUiMs: Math.round(performance.now() - generationStartedAt)
        };
        logMessage(`Производительность: фото ${lastGenerationStats.imageFetchMs}мс, данные ${lastGenerationStats.payloadMs}мс, UI всего ${lastGenerationStats.totalUiMs}мс`);

        // 4. ЗАВЕРШЕНИЕ
        updateProgress(98, 100, "Передача данных...", "Отправляем в Figma");
        throwIfCancelled();
        
        // Небольшая задержка, чтобы глаз успел заметить 100%
        const settings = getSettingsFromUI();
    const layout = {
        giftBlockEnabled,
        giftBlockMode,
        settings,
        orderList,
        infoMap,
        mainTitle: sheetContexts.length === 1 ? sheetContexts[0].title : "",
        uiStats: {
            imageFetchMs: lastGenerationStats.imageFetchMs,
            payloadMs: lastGenerationStats.payloadMs,
            totalUiMs: lastGenerationStats.totalUiMs
        },
        runs: runPayloads
    };

        setTimeout(() => {
             if (generationCancelled) {
                 disableButtons(false);
                 showProgress(false);
                 return;
             }
             parent.postMessage({ 
                 pluginMessage: { type: 'build', data: { groups: processedGroups, layout } } 
             }, '*');
        }, 200);

    } catch (err) {
        if (!generationCancelled) showError("Ошибка при генерации: " + err.message);
        disableButtons(false);
        showProgress(false);
    }
}

    resetCancellation();
    const sheets = getLoadedGoogleSheets();
    if (sheets.length === 0) {
        showError("Загрузите лист Google");
        return;
    }
    
    disableButtons(true);

        updateProgress(50, 100, "Обновление...", "Ищем карточки на холсте");

        showProgress(false);
    }
}

async function startDataValidation() {
    resetCancellation();
    clearLog();
    const jsonData = getEmbeddedProducts();
    if (jsonData.length === 0) {
        showError("Встроенная база товаров пуста");
        return;
    }

    disableButtons(true);
    showProgress(true);
    updateProgress(0, 100, "Проверка данных...", "Чтение файлов");

    try {
        throwIfCancelled();
        currentJsonCount = jsonData.length;
        updateJsonSummary(currentJsonCount);

        let infoMap = {};
        const sheets = getLoadedGoogleSheets();
        if (sheets.length === 0) {
            throw new Error("Загрузите лист Google");
        }
        const parsedOrder = sheets.length === 1
            ? (sheets[0].parsedOrder || parseOrderFileBest([sheets[0].csv]))
            : {
                orderList: sheets.flatMap(sheet => (sheet.parsedOrder || parseOrderFileBest([sheet.csv])).orderList || []),
                infoMap: mergeInfoMaps(sheets.map(sheet => (sheet.parsedOrder || parseOrderFileBest([sheet.csv])).infoMap))
            };
        infoMap = parsedOrder.infoMap;
        currentOrderInfoMap = infoMap;

        const sourceGroups = selectProductsForGeneration(jsonData, parsedOrder.orderList, infoMap);
        if (sourceGroups.length === 0) {
            throw new Error("В Google листе не найдено товаров из встроенной базы");
        }
        updateOrderSummary(infoMap, sourceGroups.length);
        logPreflight(jsonData, infoMap, sourceGroups);
        logDataProblemReport(jsonData, infoMap, sourceGroups, null);
        updateProgress(100, 100, "Проверка завершена", "Отчет в логе");
        setTimeout(() => {
            disableButtons(false);
            showProgress(false);
        }, 400);
    } catch (err) {
        showError("Ошибка проверки данных: " + err.message);
        disableButtons(false);
        showProgress(false);
    }
}

    updateProgress(0, 1, "Проверка шаблона...", "Компоненты");

}
